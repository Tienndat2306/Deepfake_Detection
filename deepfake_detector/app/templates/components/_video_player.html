<div class="glass-panel inner-glow relative aspect-video overflow-hidden group">
    <!-- HUD Overlay -->
    <div class="absolute inset-0 pointer-events-none hud-scanline z-10 opacity-30"></div>
    
    <div class="absolute top-4 left-4 z-20 flex gap-2">
        <div class="bg-black/60 px-2 py-1 rounded border border-primary/20">
            <span class="font-label-sm text-label-sm text-primary tracking-widest">REC [00:42:15]</span>
        </div>
        <div class="bg-black/60 px-2 py-1 rounded border border-primary/20">
            <span class="font-label-sm text-label-sm text-primary">FRAME: {{ current_frame }}</span>
        </div>
    </div>
    
    <div class="absolute top-4 right-4 z-20">
        <span class="bg-primary-container text-on-primary-container px-3 py-1 text-xs font-bold uppercase tracking-widest">
            {{ analysis_status }}
        </span>
    </div>
    
    <!-- Video Player -->
    <div class="w-full h-full bg-black flex items-center justify-center relative">
        <video id="analysis-video" class="w-full h-full object-cover opacity-80" 
               src="{{ video_url }}" autoplay loop>
            <img alt="Deepfake Analysis Video Feed" src="{{ video_thumbnail }}">
        </video>
        
        <!-- Analysis Markers -->
        <div class="absolute top-[35%] left-[45%] w-24 h-24 border-2 border-primary/40 rounded-full animate-pulse-glow flex items-center justify-center">
            <div class="w-1 h-1 bg-primary rounded-full"></div>
        </div>
        
        <div class="absolute bottom-[20%] right-[30%] bg-error/20 border border-error px-2 py-1 text-[10px] text-error">
            ARTIFACT DETECTED: [Jitter_04]
        </div>
        
        <!-- Player Controls -->
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent flex flex-col gap-4">
            <div class="w-full h-1 bg-white/10 relative cursor-pointer group/bar">
                <div class="absolute left-0 top-0 h-full w-[40%] bg-primary shadow-[0_0_8px_#00d1ff]"></div>
                <div class="absolute left-[40%] top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover/bar:opacity-100 transition-opacity"></div>
            </div>
            <div class="flex justify-between items-center">
                <div class="flex gap-6 items-center">
                    <button id="play-pause-btn" class="material-symbols-outlined text-white hover:text-primary transition-colors">play_arrow</button>
                    <button id="skip-next-btn" class="material-symbols-outlined text-white hover:text-primary transition-colors">skip_next</button>
                    <button id="volume-btn" class="material-symbols-outlined text-white hover:text-primary transition-colors text-xl">volume_up</button>
                    <span id="video-time" class="font-label-sm text-label-sm text-white/70">00:12:44 / 00:34:00</span>
                </div>
                <div class="flex gap-4">
                    <button class="material-symbols-outlined text-white hover:text-primary transition-colors">screenshot_region</button>
                    <button id="fullscreen-btn" class="material-symbols-outlined text-white hover:text-primary transition-colors">fullscreen</button>
                </div>
            </div>
        </div>
    </div>
</div>
